<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkty | Noodle Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a class="brand" href="index.html">
                <i class="icon icon-bowl"></i> NOODLE HUB
            </a>
            <div class="nav-links">
                <a href="index.html">Domů</a>
                <a href="products.html" class="active">Produkty</a>
                <a href="cart.html" class="cart-link">
                    <i class="icon icon-cart"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="py-5 bg-card text-center">
        <div class="container">
            <h1 class="fw-bold">Naše Nabídka</h1>
            <p class="text-muted">Prozkoumejte nejširší výběr asijských instantních nudlí.</p>
        </div>
    </header>

    <!-- Product Grid -->
    <section class="py-5">
        <div class="container">
            <!-- Filter & Sort Bar -->
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-4 mb-5 p-4"
                style="background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--border-radius);">
                <div class="category-badges" style="margin-bottom: 0; justify-content: flex-start;">
                    <button class="category-badge filter-btn active" data-category="all">Vše</button>
                    <button class="category-badge filter-btn" data-category="hot">🔥 Extra pálivé</button>
                    <button class="category-badge filter-btn" data-category="soup">🍜 Polévkové</button>
                    <button class="category-badge filter-btn" data-category="fried">🥢 Smažené</button>
                    <button class="category-badge filter-btn" data-category="mild">🥛 Jemné / Krémové</button>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted fw-bold">Seřadit:</span>
                    <select class="form-control" id="sort-select"
                        style="width: auto; border-radius: var(--border-radius); cursor: pointer;">
                        <option value="default">Doporučené</option>
                        <option value="price-asc">Nejlevnější</option>
                        <option value="price-desc">Nejdražší</option>
                        <option value="heat-asc">Nejméně pálivé</option>
                        <option value="heat-desc">Nejvíce pálivé</option>
                    </select>
                </div>
            </div>

            <!-- Dynamic Grid Rendered by JS -->
            <div class="grid grid-cols-4" id="product-grid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="text-muted small">&copy; 2026 Noodle Hub. Všechna práva vyhrazena.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>

</html>
